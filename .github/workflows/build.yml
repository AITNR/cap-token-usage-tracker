name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: token-usage-tracker.so
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            output: token-usage-tracker.so
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: token-usage-tracker.dll
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: token-usage-tracker.dylib
          - os: macos-latest
            goos: darwin
            goarch: amd64
            output: token-usage-tracker.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Linux arm64 cross-compiler
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Set up MinGW for Windows
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $mingwPaths = @(
            "C:\msys64\mingw64\bin",
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin",
            "C:\mingw64\bin"
          )
          foreach ($p in $mingwPaths) {
            if (Test-Path "$p\gcc.exe") {
              Write-Host "Found gcc at $p"
              echo "$p" >> $env:GITHUB_PATH
              break
            }
          }
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            Write-Host "gcc not found, installing via choco..."
            choco install mingw -y --no-progress
            refreshenv
          }

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -buildmode=c-shared -o ${{ matrix.output }} .

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $name = "token-usage-tracker_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          Compress-Archive -Path "${{ matrix.output }}" -DestinationPath "dist/$name" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$name").Hash.ToLower()
          "$hash  $name" | Out-File -Append -Encoding utf8 dist/checksums.txt

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          mkdir -p dist
          zip -j dist/token-usage-tracker_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip ${{ matrix.output }}
          cd dist
          sha256sum *.zip >> checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: token-usage-tracker_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/checksums.txt

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: |
          cat artifacts/*/checksums.txt | sort -u > checksums.txt
          mv checksums.txt artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/checksums.txt
          generate_release_notes: true
