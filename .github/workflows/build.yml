name: Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      release:
        description: "Create release after build"
        type: boolean
        default: false

env:
  PLUGIN_ID: cap-token-usage-tracker

jobs:
  build-windows-amd64:
    name: Windows amd64 (.dll)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install MinGW-w64
        run: choco install mingw -y

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}" -replace '^v', ''
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            $v = "${{ github.event.inputs.version }}" -replace '^v', ''
          } else {
            $v = "dev-${{ github.sha }}"
          }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build DLL
        shell: pwsh
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "1"
          $version = "${{ steps.ver.outputs.version }}"
          go build -buildmode=c-shared -trimpath -buildvcs=false `
            -ldflags="-s -w -X main.version=$version" `
            -o "${{ env.PLUGIN_ID }}.dll" .

      - name: Create zip
        shell: pwsh
        run: |
          $zipName = "${{ env.PLUGIN_ID }}_${{ steps.ver.outputs.version }}_windows_amd64.zip"
          Compress-Archive -Path "${{ env.PLUGIN_ID }}.dll" -DestinationPath $zipName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-amd64
          path: ${{ env.PLUGIN_ID }}_${{ steps.ver.outputs.version }}_windows_amd64.zip

  build-linux-amd64:
    name: Linux amd64 (.so)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
            echo "version=${v#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .so
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          go build -buildmode=c-shared -trimpath -buildvcs=false \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${{ env.PLUGIN_ID }}.so" .

      - name: Create zip
        run: |
          zipName="${{ env.PLUGIN_ID }}_${{ steps.ver.outputs.version }}_linux_amd64.zip"
          zip "$zipName" "${{ env.PLUGIN_ID }}.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: ${{ env.PLUGIN_ID }}_${{ steps.ver.outputs.version }}_linux_amd64.zip

  build-linux-arm64:
    name: Linux arm64 (.so)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install aarch64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
            echo "version=${v#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .so
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: arm64
          CC: aarch64-linux-gnu-gcc
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          go build -buildmode=c-shared -trimpath -buildvcs=false \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${{ env.PLUGIN_ID }}.so" .

      - name: Create zip
        run: |
          zipName="${{ env.PLUGIN_ID }}_${{ steps.ver.outputs.version }}_linux_arm64.zip"
          zip "$zipName" "${{ env.PLUGIN_ID }}.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64
          path: ${{ env.PLUGIN_ID }}_${{ steps.ver.outputs.version }}_linux_arm64.zip

  release:
    name: Create Release
    needs: [ build-windows-amd64, build-linux-amd64, build-linux-arm64 ]
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
    permissions:
      contents: write
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            v="${{ github.event.inputs.version }}"
            echo "version=${v#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f

      - name: Generate checksums.txt
        run: |
          cd artifacts
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Release v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/checksums.txt
